<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>invites — Interactive Prototype</title>
<link rel="stylesheet" href="tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; }
  @keyframes dsLoadPulse { 0%,100% { opacity: 0.25; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1); } }
  @keyframes protoFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes protoPopIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes protoSheetUp { from { transform: translateY(40px); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
  @keyframes protoStepIn { from { transform: translateY(8px); } to { transform: none; } }
  @keyframes protoToastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes protoSpin { to { transform: rotate(360deg); } }
  .proto-spinner {
    width: 12px; height: 12px; border-radius: 50%; display: inline-block;
    border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    animation: protoSpin 700ms linear infinite;
  }
  button { transition: filter 200ms ease-out, transform 120ms ease-out, background-color 200ms ease-out; }
  button:not(:disabled):hover { filter: brightness(0.96); }
  button:not(:disabled):active { transform: scale(0.98); }
  .proto-card { transition: transform 200ms ease-out, box-shadow 200ms ease-out; }
  .proto-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md) !important; }
  .no-motion *, .no-motion *::before, .no-motion *::after {
    animation-duration: 0.001s !important; transition-duration: 0.001s !important;
  }
  input[type="range"] { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ds-controls.jsx"></script>
<script type="text/babel" src="ds-patterns.jsx"></script>
<script type="text/babel" src="ds-cards-states.jsx"></script>
<script type="text/babel" src="ds-compositions.jsx"></script>
<script type="text/babel" src="pages-shared.jsx"></script>
<script type="text/babel" src="pages-landing.jsx"></script>
<script type="text/babel" src="admin-shared.jsx"></script>
<script type="text/babel" src="admin-editor.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="proto-shared.jsx"></script>
<script type="text/babel" src="pages-guests.jsx"></script>
<script type="text/babel" src="proto-public.jsx"></script>
<script type="text/babel" src="proto-create.jsx"></script>
<script type="text/babel" src="proto-dash-guest.jsx"></script>
<script type="text/babel" src="proto-admin.jsx"></script>
<script type="text/babel" src="proto-assets.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#8B5CF6",
  "motion": true
}/*EDITMODE-END*/;

const ACCENTS = {
  '#8B5CF6': { hover: '#7C3AED', subtle: '#F3EEFE' },
  '#6D5BD0': { hover: '#5B49C0', subtle: '#EFEDFA' },
  '#B07A3F': { hover: '#9A6832', subtle: '#FBF3EA' },
};

const SCREENS = {
  landing: ProtoLanding,
  templates: ProtoTemplates,
  detail: ProtoDetail,
  create: ProtoCreate,
  dashboard: ProtoDashboard,
  guest: ProtoGuest,
  invalid: () => <InvalidLinkState variant="archived" />,
  editor: ProtoEditor,
  assets: ProtoAssets,
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = React.useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('invites-proto-route'));
      if (saved && SCREENS[saved.screen]) return saved;
    } catch (e) {}
    return { screen: 'landing', params: {} };
  });
  const [toasts, setToasts] = React.useState([]);
  const [invite, setInvite] = React.useState({ ...defaultInvite });
  const [invites, setInvites] = React.useState([
    { id: 1, tplId: 'tsetsegs', title: 'Анужингийн төрсөн өдөр', status: 'published', date: 'Өчигдөр', views: 142, rsvp: 24 },
    { id: 2, tplId: 'altan-namar', title: 'Б.Болд & М.Сараа хурим', status: 'published', date: '3 хоногийн өмнө', views: 89, rsvp: 56 },
    { id: 3, tplId: 'gerelt-udesh', title: 'Q3 компанийн арга хэмжээ', status: 'draft', date: '1 цагийн өмнө', views: 0, rsvp: 0 },
  ]);
  const toastId = React.useRef(0);

  const nav = (screen, params = {}) => {
    const r = { screen, params };
    setRoute(r);
    try { localStorage.setItem('invites-proto-route', JSON.stringify(r)); } catch (e) {}
    window.scrollTo(0, 0);
  };

  const toast = (msg, variant = 'success') => {
    const id = toastId.current++;
    setToasts(ts => [...ts, { id, msg, variant }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 2600);
  };

  const publishInvite = () => {
    setInvites(list => {
      const exists = list.find(i => i.title === invite.title);
      if (exists) return list.map(i => i.title === invite.title ? { ...i, status: 'published', date: 'Дөнгөж сая' } : i);
      return [{ id: Date.now(), tplId: 'tsetsegs', title: invite.title, status: 'published', date: 'Дөнгөж сая', views: 0, rsvp: 0 }, ...list];
    });
  };

  React.useEffect(() => {
    const a = ACCENTS[t.accent] || ACCENTS['#8B5CF6'];
    const r = document.documentElement.style;
    r.setProperty('--color-accent', t.accent);
    r.setProperty('--color-accent-hover', a.hover);
    r.setProperty('--color-accent-subtle', a.subtle);
    document.documentElement.classList.toggle('no-motion', !t.motion);
  }, [t.accent, t.motion]);

  const Screen = SCREENS[route.screen] || ProtoLanding;

  return (
    <ProtoCtx.Provider value={{ nav, params: route.params, screen: route.screen, toast, invite, setInvite, invites, setInvites, publishInvite }}>
      <div key={route.screen} style={{ animation: 'protoStepIn 240ms ease-out' }}>
        <Screen />
      </div>
      <FlowSwitcher screen={route.screen} />
      <ToastHost toasts={toasts} />
      <TweaksPanel>
        <TweakSection label="Брэнд" />
        <TweakColor label="Accent өнгө" value={t.accent} options={Object.keys(ACCENTS)} onChange={(v) => setTweak('accent', v)} />
        <TweakSection label="Хөдөлгөөн" />
        <TweakToggle label="Animation" value={t.motion} onChange={(v) => setTweak('motion', v)} />
      </TweaksPanel>
    </ProtoCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
