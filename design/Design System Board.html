<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>invites — Design System</title>
<link rel="stylesheet" href="tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  @keyframes dsLoadPulse {
    0%, 100% { opacity: 0.25; transform: scale(0.85); }
    50% { opacity: 1; transform: scale(1); }
  }
  html { scroll-behavior: smooth; }
  .board-nav a:hover { color: var(--color-text-primary) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ds-foundations.jsx"></script>
<script type="text/babel" src="ds-controls.jsx"></script>
<script type="text/babel" src="ds-patterns.jsx"></script>
<script type="text/babel" src="ds-cards-states.jsx"></script>
<script type="text/babel" src="ds-compositions.jsx"></script>

<script type="text/babel">
const boardS = {
  page: { maxWidth: 1240, margin: '0 auto', padding: '0 40px 80px' },
  hero: {
    padding: '56px 0 40px',
    borderBottom: '1px solid var(--color-border)',
    marginBottom: 40,
  },
  bandTitle: {
    fontSize: 24, fontWeight: 700, letterSpacing: '-0.02em',
    color: 'var(--color-text-primary)',
    paddingBottom: 16, marginBottom: 32, marginTop: 72,
    borderBottom: '2px solid var(--color-primary)',
    display: 'flex', alignItems: 'baseline', gap: 12,
  },
  bandNum: { fontSize: 12, fontWeight: 500, color: 'var(--color-accent)', fontFamily: 'monospace' },
};

function Band({ num, title, id, children }) {
  return (
    <section id={id} data-screen-label={title}>
      <h2 style={boardS.bandTitle}><span style={boardS.bandNum}>{num}</span>{title}</h2>
      {children}
    </section>
  );
}

function Board() {
  const navItems = [
    ['#foundations', '01 Foundations'],
    ['#controls', '02 Controls'],
    ['#patterns', '03 Patterns'],
    ['#cards', '04 Cards & States'],
    ['#compositions', '05 Compositions'],
  ];
  return (
    <div style={boardS.page}>
      <header style={boardS.hero} data-screen-label="Header">
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, backgroundColor: 'var(--color-accent)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ color: '#fff', fontSize: 15, fontWeight: 700 }}>i</span>
          </div>
          <span style={{ fontSize: 20, fontWeight: 600, letterSpacing: '-0.01em' }}>invites</span>
        </div>
        <h1 style={{ fontSize: 40, fontWeight: 700, letterSpacing: '-0.025em', margin: '0 0 8px', lineHeight: 1.15 }}>Design System</h1>
        <p style={{ fontSize: 14, color: 'var(--color-text-secondary)', margin: '0 0 24px', maxWidth: 560, lineHeight: 1.6 }}>
          Монголын дижитал урилгын платформын дизайн систем. Premium, цэвэрхэн, дулаан өнгө аяс — Roboto, 12px суурь хэмжээ, нягт боловч тансаг UI нягтрал.
        </p>
        <nav className="board-nav" style={{ display: 'flex', gap: 20 }}>
          {navItems.map(([href, label]) => (
            <a key={href} href={href} style={{ fontSize: 12, fontWeight: 500, color: 'var(--color-text-secondary)', textDecoration: 'none', transition: 'color 150ms' }}>{label}</a>
          ))}
        </nav>
      </header>

      <Band num="01" title="Foundations" id="foundations">
        <FoundationsShowcase />
      </Band>

      <Band num="02" title="Controls" id="controls">
        <ButtonShowcase />
        <InputShowcase />
      </Band>

      <Band num="03" title="Patterns" id="patterns">
        <PatternsShowcase />
      </Band>

      <Band num="04" title="Cards & States" id="cards">
        <CardsStatesShowcase />
      </Band>

      <Band num="05" title="Compositions" id="compositions">
        <CompositionsShowcase />
      </Band>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Board />);
</script>
</body>
</html>
