<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="topband" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b3a5c"/>
    </linearGradient>
    <linearGradient id="accentH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b3a5c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1b3a5c"/>
      <stop offset="100%" stop-color="#1b3a5c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Subtle blue ambient -->
  <ellipse cx="900" cy="500" rx="400" ry="350" fill="#dbeafe" opacity="0.45" filter="url(#blur)"/>
  <ellipse cx="200" cy="1500" rx="380" ry="300" fill="#e0e7ff" opacity="0.35" filter="url(#blur)"/>

  <!-- Deep navy top header -->
  <rect x="0" y="0" width="1080" height="140" fill="url(#topband)"/>

  <!-- Blue accent left stripe -->
  <rect x="0" y="140" width="8" height="1640" fill="url(#stripe)"/>

  <!-- Blue accent right stripe -->
  <rect x="1072" y="140" width="8" height="1640" fill="url(#stripe)"/>

  <!-- Horizontal rule under header -->
  <line x1="0" y1="140" x2="1080" y2="140" stroke="#3b82f6" stroke-width="3" opacity="0.6"/>
  <line x1="0" y1="145" x2="1080" y2="145" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>

  <!-- Abstract building silhouette (subtle, behind content area) -->
  <rect x="380" y="1550" width="80" height="240" fill="#1b3a5c" opacity="0.04"/>
  <rect x="460" y="1500" width="60" height="290" fill="#1b3a5c" opacity="0.04"/>
  <rect x="520" y="1570" width="50" height="220" fill="#1b3a5c" opacity="0.04"/>
  <rect x="570" y="1540" width="70" height="250" fill="#1b3a5c" opacity="0.04"/>
  <rect x="640" y="1600" width="60" height="190" fill="#1b3a5c" opacity="0.04"/>

  <!-- Central divider -->
  <line x1="80" y1="880" x2="440" y2="880" stroke="url(#accentH)" stroke-width="1.5"/>
  <rect x="520" y="872" width="40" height="16" rx="2" fill="#1b3a5c" opacity="0.3"/>
  <line x1="640" y1="880" x2="1000" y2="880" stroke="url(#accentH)" stroke-width="1.5"/>

  <!-- Grid dots subtle -->
  <circle cx="120" cy="200" r="2.5" fill="#1b3a5c" opacity="0.12"/>
  <circle cx="200" cy="200" r="2.5" fill="#1b3a5c" opacity="0.12"/>
  <circle cx="880" cy="200" r="2.5" fill="#1b3a5c" opacity="0.12"/>
  <circle cx="960" cy="200" r="2.5" fill="#1b3a5c" opacity="0.12"/>

  <!-- Corner bracket marks -->
  <path d="M56 180 L56 220 L96 220" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.35"/>
  <path d="M1024 180 L1024 220 L984 220" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.35"/>
  <path d="M56 1760 L56 1720 L96 1720" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.35"/>
  <path d="M1024 1760 L1024 1720 L984 1720" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.35"/>

  <!-- Bottom band -->
  <rect x="0" y="1780" width="1080" height="140" fill="url(#topband)"/>
  <line x1="0" y1="1780" x2="1080" y2="1780" stroke="#3b82f6" stroke-width="3" opacity="0.6"/>
  <line x1="0" y1="1775" x2="1080" y2="1775" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
</svg>
